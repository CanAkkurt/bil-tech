<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44A08D;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#1e3a5f"/>
  <!-- Wall -->
  <rect x="50" y="40" width="300" height="200" rx="5" fill="#E8E8E8"/>
  <!-- Radiator -->
  <rect x="80" y="80" width="240" height="120" rx="3" fill="url(#grad2)" stroke="#333" stroke-width="2"/>
  <!-- Fins -->
  <g stroke="#FF6B6B" stroke-width="3" opacity="0.8">
    <line x1="110" y1="85" x2="110" y2="195"/>
    <line x1="140" y1="85" x2="140" y2="195"/>
    <line x1="170" y1="85" x2="170" y2="195"/>
    <line x1="200" y1="85" x2="200" y2="195"/>
    <line x1="230" y1="85" x2="230" y2="195"/>
    <line x1="260" y1="85" x2="260" y2="195"/>
    <line x1="290" y1="85" x2="290" y2="195"/>
  </g>
  <!-- Heat waves -->
  <path d="M 70 70 Q 80 60 90 70" stroke="#FF6B6B" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 310 70 Q 320 60 330 70" stroke="#FF6B6B" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Pipes -->
  <rect x="75" y="210" width="15" height="30" rx="7" fill="#555"/>
  <rect x="310" y="210" width="15" height="30" rx="7" fill="#555"/>
  <text x="200" y="290" font-size="20" fill="#FFF" text-anchor="middle">Radiator Systeem</text>
</svg>
