<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4757;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#1e3a5f"/>
  <!-- Boiler -->
  <rect x="100" y="80" width="200" height="140" rx="10" fill="url(#grad1)" stroke="#333" stroke-width="2"/>
  <!-- Boiler door -->
  <rect x="130" y="110" width="140" height="100" rx="5" fill="#FFD93D" opacity="0.7"/>
  <!-- Window -->
  <circle cx="200" cy="160" r="25" fill="#FFF" opacity="0.6"/>
  <!-- Flame inside -->
  <path d="M 200 160 Q 190 140 195 120 Q 200 110 205 120 Q 210 140 200 160" fill="#FF6B6B"/>
  <!-- Pipes -->
  <line x1="200" y1="220" x2="200" y2="260" stroke="#555" stroke-width="8"/>
  <line x1="180" y1="240" x2="220" y2="240" stroke="#555" stroke-width="8"/>
  <!-- Temperature gauge -->
  <circle cx="80" cy="100" r="20" fill="none" stroke="#FFD93D" stroke-width="3"/>
  <line x1="80" y1="85" x2="80" y2="115" stroke="#FFD93D" stroke-width="2"/>
  <text x="200" y="290" font-size="20" fill="#FFF" text-anchor="middle">Moderne Ketel</text>
</svg>
