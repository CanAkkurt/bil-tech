<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#1e3a5f"/>
  <!-- Person -->
  <circle cx="100" cy="60" r="20" fill="#FFD700"/>
  <!-- Body -->
  <rect x="90" y="85" width="20" height="60" fill="#FF6B6B"/>
  <!-- Arms -->
  <line x1="90" y1="95" x2="50" y2="110" stroke="#FFD700" stroke-width="8"/>
  <line x1="110" y1="95" x2="150" y2="110" stroke="#FFD700" stroke-width="8"/>
  <!-- Tools in hand -->
  <g transform="translate(150, 110)">
    <rect x="0" y="0" width="30" height="8" rx="4" fill="#555" transform="rotate(45)"/>
    <circle cx="8" cy="8" r="4" fill="#FFD700"/>
  </g>
  <!-- Legs -->
  <line x1="95" y1="145" x2="95" y2="180" stroke="#333" stroke-width="8"/>
  <line x1="105" y1="145" x2="105" y2="180" stroke="#333" stroke-width="8"/>
  <!-- Shoes -->
  <ellipse cx="95" cy="185" rx="8" ry="6" fill="#000"/>
  <ellipse cx="105" cy="185" rx="8" ry="6" fill="#000"/>
  <!-- Equipment -->
  <rect x="220" y="100" width="120" height="100" rx="8" fill="#4ECDC4" stroke="#333" stroke-width="2"/>
  <rect x="240" y="120" width="80" height="60" rx="5" fill="#FFD93D" opacity="0.7"/>
  <text x="280" y="155" font-size="12" fill="#000" text-anchor="middle">Onderhoud</text>
  <!-- Wrench -->
  <path d="M 180 140 L 210 140 Q 220 140 220 150 L 210 160 L 180 160" fill="#FF6B6B" stroke="#333" stroke-width="2"/>
  <text x="200" y="290" font-size="20" fill="#FFF" text-anchor="middle">Professioneel Onderhoud</text>
</svg>
